name: Check appshubcc/Bettbox Release

on:
  schedule:
    - cron: '40 16 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Force re-notify even if already notified
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: bettbox-release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      REPO: appshubcc/Bettbox
      DATA_FILE: .github/data/last-release-bettbox.txt
      NOTIFY_TITLE: Bettbox新版本发布！
      NOTIFY_DESCRIPTION: 优秀的mihomo内核全平台代理工具
      NOTIFY_GROUP_URL: https://t.me/appshub_chat
      ASSET_INCLUDE: .apk+arm64-v8a, .dmg+amd64, .exe+amd64
      ASSET_EXCLUDE: linux, compatible
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/scripts/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Check and notify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN_03BOT }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID_BETTBOX }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          FORCE: ${{ inputs.force || '' }}
        run: python3 .github/scripts/check_release_telethon.py

      - name: Persist release data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.DATA_FILE }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "update last release data [skip ci]"
          git push
